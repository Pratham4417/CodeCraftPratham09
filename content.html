<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Content using DOM</title>
</head>

<body>

    <h2 id="heading">Welcome</h2>

    <button onclick="changeContent()">
        Click Here
    </button>

    <script>

        function changeContent() {

            // Access element using DOM
            let text = document.getElementById("heading");

            // Change content dynamically
            text.innerHTML = "Hello! Content Changed Using DOM";

        }

    </script>

</body>
</html>
